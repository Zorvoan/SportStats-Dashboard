<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="card">
    <h1>Create account.</h1>
    <p class="sub">Already registered? <a href="/login.html">Sign in →</a></p>

    <div id="msg" class="msg"></div>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="coolhandle" autocomplete="username">
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="pass">Password</label>
      <input id="pass" type="password" placeholder="8+ characters" autocomplete="new-password">
    </div>
    <button id="btn">Create Account</button>
  </div>

  <script>
    fetch('/api/me').then(r => { if (r.ok) location.href = '/dashboard.html'; });

    document.getElementById('btn').onclick = async () => {
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');
      msg.className = 'msg';
      btn.disabled = true;

      const res  = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          email:    document.getElementById('email').value,
          password: document.getElementById('pass').value
        })
      });
      const data = await res.json();
      btn.disabled = false;

      if (res.ok) {
        msg.textContent = 'Account created! Redirecting…';
        msg.className = 'msg success';
        setTimeout(() => location.href = '/dashboard.html', 800);
      } else {
        msg.textContent = data.error;
        msg.className = 'msg error';
      }
    };
  </script>
</body>
</html>
